version: '3.8'

services:
  ai-chat-platform:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-chat-platform
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=https://api.modelverse.cn/v1
      - OPENAI_MODEL=gpt-5.5
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
