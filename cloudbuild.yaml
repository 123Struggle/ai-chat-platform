steps:
  # 构建 Docker 镜像
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/ai-chat-platform:$COMMIT_SHA', '.']

  # 推送镜像到 Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ai-chat-platform:$COMMIT_SHA']

  # 部署到 Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ai-chat-platform'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ai-chat-platform:$COMMIT_SHA'
      - '--region'
      - 'asia-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'OPENAI_BASE_URL=https://api.modelverse.cn/v1,OPENAI_MODEL=gpt-5.5'
      - '--set-secrets'
      - 'OPENAI_API_KEY=OPENAI_API_KEY:latest'

images:
  - 'gcr.io/$PROJECT_ID/ai-chat-platform:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
